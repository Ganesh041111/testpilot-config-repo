server.port=8087

jwt.secret=${JWT_SECRET}

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[2].id=ai-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://AI-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/ai/**

spring.cloud.gateway.server.webmvc.routes[3].id=testcase-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://TESTCASE-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/testcases/**

spring.cloud.gateway.server.webmvc.routes[4].id=project-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.server.webmvc.routes[5].id=notification-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.server.webmvc.routes[6].id=reporting-service
